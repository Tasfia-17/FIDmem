<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9b8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8d4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9bbfe8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4eac8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d9a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5eeff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ddd0f8;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#c4b0e0" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 3D Cube body -->
  <!-- Top face -->
  <polygon points="100,30 160,62 100,94 40,62" fill="url(#topFace)" stroke="#c4b0e0" stroke-width="1" filter="url(#shadow)"/>
  <!-- Left face -->
  <polygon points="40,62 100,94 100,154 40,122" fill="url(#leftFace)" stroke="#9bbfe8" stroke-width="1"/>
  <!-- Right face -->
  <polygon points="100,94 160,62 160,122 100,154" fill="url(#rightFace)" stroke="#b8d9a8" stroke-width="1"/>

  <!-- Inner memory lines on top face (representing data layers) -->
  <line x1="70" y1="62" x2="130" y2="62" stroke="#c4b0e0" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="70" x2="125" y2="70" stroke="#c4b0e0" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="78" x2="120" y2="78" stroke="#c4b0e0" stroke-width="1" opacity="0.3"/>

  <!-- FID text on top face -->
  <text x="100" y="67" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="700" fill="#7c5cbf" opacity="0.9">FID</text>

  <!-- Connection dots on left face -->
  <circle cx="58" cy="95" r="3" fill="#9bbfe8" opacity="0.8"/>
  <circle cx="58" cy="108" r="3" fill="#9bbfe8" opacity="0.6"/>
  <circle cx="58" cy="121" r="3" fill="#9bbfe8" opacity="0.4"/>
  <line x1="61" y1="95" x2="75" y2="95" stroke="#9bbfe8" stroke-width="1" opacity="0.6"/>
  <line x1="61" y1="108" x2="75" y2="108" stroke="#9bbfe8" stroke-width="1" opacity="0.5"/>
  <line x1="61" y1="121" x2="75" y2="121" stroke="#9bbfe8" stroke-width="1" opacity="0.4"/>

  <!-- Connection dots on right face -->
  <circle cx="142" cy="95" r="3" fill="#b8d9a8" opacity="0.8"/>
  <circle cx="142" cy="108" r="3" fill="#b8d9a8" opacity="0.6"/>
  <circle cx="142" cy="121" r="3" fill="#b8d9a8" opacity="0.4"/>
  <line x1="125" y1="95" x2="139" y2="95" stroke="#b8d9a8" stroke-width="1" opacity="0.6"/>
  <line x1="125" y1="108" x2="139" y2="108" stroke="#b8d9a8" stroke-width="1" opacity="0.5"/>
  <line x1="125" y1="121" x2="139" y2="121" stroke="#b8d9a8" stroke-width="1" opacity="0.4"/>

  <!-- mem text on cube -->
  <text x="100" y="130" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" font-weight="600" fill="#5a8a6a" opacity="0.85">mem</text>

  <!-- Floating agent nodes around cube -->
  <circle cx="28" cy="42" r="8" fill="#f5eeff" stroke="#c4b0e0" stroke-width="1.5"/>
  <text x="28" y="46" text-anchor="middle" font-family="monospace" font-size="8" fill="#9b7cc8">A</text>

  <circle cx="172" cy="42" r="8" fill="#eef5ff" stroke="#9bbfe8" stroke-width="1.5"/>
  <text x="172" y="46" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a8ab8">B</text>

  <circle cx="100" cy="175" r="8" fill="#eef5ee" stroke="#b8d9a8" stroke-width="1.5"/>
  <text x="100" y="179" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a8a6a">C</text>

  <!-- Connection lines from agents to cube -->
  <line x1="35" y1="47" x2="55" y2="58" stroke="#c4b0e0" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="165" y1="47" x2="145" y2="58" stroke="#9bbfe8" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="100" y1="167" x2="100" y2="154" stroke="#b8d9a8" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
</svg>

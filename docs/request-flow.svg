<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8ff"/>
      <stop offset="100%" style="stop-color:#f4f8ff"/>
    </linearGradient>
    <!-- 3D cube faces -->
    <linearGradient id="cubeTop1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5f5"/>
      <stop offset="100%" style="stop-color:#d4c0f0"/>
    </linearGradient>
    <linearGradient id="cubeLeft1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8b4e8"/>
      <stop offset="100%" style="stop-color:#b8a0e0"/>
    </linearGradient>
    <linearGradient id="cubeRight1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8c8f0"/>
      <stop offset="100%" style="stop-color:#c8b4e8"/>
    </linearGradient>
    <linearGradient id="cubeTop2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8ff"/>
      <stop offset="100%" style="stop-color:#b8d4f8"/>
    </linearGradient>
    <linearGradient id="cubeLeft2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8c8f0"/>
      <stop offset="100%" style="stop-color:#90b8e8"/>
    </linearGradient>
    <linearGradient id="cubeRight2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8d8f8"/>
      <stop offset="100%" style="stop-color:#a0c8f0"/>
    </linearGradient>
    <linearGradient id="cubeTop3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4eac8"/>
      <stop offset="100%" style="stop-color:#b8d8a8"/>
    </linearGradient>
    <linearGradient id="cubeLeft3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8d098"/>
      <stop offset="100%" style="stop-color:#90c080"/>
    </linearGradient>
    <linearGradient id="cubeRight3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8d8a8"/>
      <stop offset="100%" style="stop-color:#a0c890"/>
    </linearGradient>
    <linearGradient id="cubeTop4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde8d0"/>
      <stop offset="100%" style="stop-color:#f8d0b0"/>
    </linearGradient>
    <linearGradient id="cubeLeft4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0c090"/>
      <stop offset="100%" style="stop-color:#e8b070"/>
    </linearGradient>
    <linearGradient id="cubeRight4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8d0b0"/>
      <stop offset="100%" style="stop-color:#f0c090"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#c4b0e0" flood-opacity="0.3"/>
    </filter>
    <marker id="arr1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c4b0e0"/>
    </marker>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9bbfe8"/>
    </marker>
    <marker id="arr3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#b8d9a8"/>
    </marker>
    <marker id="arr4" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f5c8a0"/>
    </marker>
  </defs>

  <rect width="860" height="340" fill="url(#bg2)" rx="16"/>
  <text x="430" y="32" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="15" font-weight="700" fill="#5a4a7a">Request Flow</text>
  <text x="430" y="50" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="10" fill="#9b8ab8">How an agent reads memory from FIDmem</text>

  <!-- Step labels -->
  <text x="75" y="80" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#9b8ab8">1. Agent requests</text>
  <text x="230" y="80" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#9b8ab8">2. 402 returned</text>
  <text x="385" y="80" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#9b8ab8">3. Agent pays USDC</text>
  <text x="560" y="80" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#9b8ab8">4. Identity verified</text>
  <text x="730" y="80" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#9b8ab8">5. Memory returned</text>

  <!-- ── Cube 1: Agent ── -->
  <!-- top -->
  <polygon points="75,100 115,120 75,140 35,120" fill="url(#cubeTop1)" stroke="#c4b0e0" stroke-width="1"/>
  <!-- left -->
  <polygon points="35,120 75,140 75,200 35,180" fill="url(#cubeLeft1)" stroke="#b8a0e0" stroke-width="1"/>
  <!-- right -->
  <polygon points="75,140 115,120 115,180 75,200" fill="url(#cubeRight1)" stroke="#c8b4e8" stroke-width="1"/>
  <text x="75" y="128" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#7c5cbf">Agent</text>
  <text x="75" y="165" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#9b7cc8">Bob</text>
  <!-- dots on face -->
  <circle cx="58" cy="155" r="2.5" fill="#c4b0e0" opacity="0.8"/>
  <circle cx="58" cy="165" r="2.5" fill="#c4b0e0" opacity="0.6"/>
  <circle cx="58" cy="175" r="2.5" fill="#c4b0e0" opacity="0.4"/>

  <!-- Arrow 1 to 2 -->
  <path d="M 118,160 C 145,160 155,160 168,160" stroke="#c4b0e0" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr1)"/>
  <rect x="126" y="148" width="36" height="14" rx="4" fill="#faf8ff"/>
  <text x="144" y="158" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#7c5cbf">GET /mem</text>

  <!-- ── Cube 2: API ── -->
  <polygon points="230,100 270,120 230,140 190,120" fill="url(#cubeTop2)" stroke="#9bbfe8" stroke-width="1"/>
  <polygon points="190,120 230,140 230,200 190,180" fill="url(#cubeLeft2)" stroke="#90b8e8" stroke-width="1"/>
  <polygon points="230,140 270,120 270,180 230,200" fill="url(#cubeRight2)" stroke="#b8d8f8" stroke-width="1"/>
  <text x="230" y="128" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#3a6a9a">API</text>
  <text x="230" y="165" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#5a8ab8">402</text>
  <text x="230" y="178" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#5a8ab8">Payment</text>
  <text x="230" y="189" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#5a8ab8">Required</text>
  <!-- lines on right face -->
  <line x1="240" y1="148" x2="265" y2="135" stroke="#9bbfe8" stroke-width="0.8" opacity="0.5"/>
  <line x1="240" y1="158" x2="265" y2="145" stroke="#9bbfe8" stroke-width="0.8" opacity="0.4"/>
  <line x1="240" y1="168" x2="265" y2="155" stroke="#9bbfe8" stroke-width="0.8" opacity="0.3"/>

  <!-- Arrow 2 to 3 -->
  <path d="M 273,160 C 300,160 310,160 323,160" stroke="#9bbfe8" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr2)"/>
  <rect x="280" y="148" width="36" height="14" rx="4" fill="#faf8ff"/>
  <text x="298" y="158" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#3a6a9a">402 back</text>

  <!-- ── Cube 3: x402 / Base ── -->
  <polygon points="385,100 425,120 385,140 345,120" fill="url(#cubeTop4)" stroke="#f5c8a0" stroke-width="1"/>
  <polygon points="345,120 385,140 385,200 345,180" fill="url(#cubeLeft4)" stroke="#e8b070" stroke-width="1"/>
  <polygon points="385,140 425,120 425,180 385,200" fill="url(#cubeRight4)" stroke="#f8d0b0" stroke-width="1"/>
  <text x="385" y="125" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#a06030">x402</text>
  <text x="385" y="160" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" fill="#c08050">USDC</text>
  <text x="385" y="172" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#c08050">on Base</text>
  <text x="385" y="184" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7" fill="#c08050">$0.001</text>
  <!-- coin stack visual on left face -->
  <ellipse cx="362" cy="155" rx="10" ry="4" fill="#f5c8a0" stroke="#e8b070" stroke-width="0.8"/>
  <ellipse cx="362" cy="162" rx="10" ry="4" fill="#fde8d0" stroke="#f5c8a0" stroke-width="0.8"/>
  <ellipse cx="362" cy="169" rx="10" ry="4" fill="#f5c8a0" stroke="#e8b070" stroke-width="0.8"/>

  <!-- Arrow 3 to 4 -->
  <path d="M 428,160 C 460,160 475,160 498,160" stroke="#f5c8a0" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr4)"/>
  <rect x="436" y="148" width="54" height="14" rx="4" fill="#faf8ff"/>
  <text x="463" y="158" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#a06030">paid + retry</text>

  <!-- ── Cube 4: ERC-8004 ── -->
  <polygon points="560,100 600,120 560,140 520,120" fill="url(#cubeTop1)" stroke="#c4b0e0" stroke-width="1"/>
  <polygon points="520,120 560,140 560,200 520,180" fill="url(#cubeLeft1)" stroke="#b8a0e0" stroke-width="1"/>
  <polygon points="560,140 600,120 600,180 560,200" fill="url(#cubeRight1)" stroke="#c8b4e8" stroke-width="1"/>
  <text x="560" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8" font-weight="700" fill="#7c5cbf">ERC-8004</text>
  <text x="560" y="158" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#9b7cc8">identity</text>
  <text x="560" y="170" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#9b7cc8">verified</text>
  <!-- checkmark on right face -->
  <text x="580" y="162" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#b8d9a8" opacity="0.9">✓</text>

  <!-- Arrow 4 to 5 -->
  <path d="M 603,160 C 630,160 645,160 668,160" stroke="#c4b0e0" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr1)"/>
  <rect x="610" y="148" width="50" height="14" rx="4" fill="#faf8ff"/>
  <text x="635" y="158" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#7c5cbf">access ok</text>

  <!-- ── Cube 5: Turso DB ── -->
  <polygon points="730,100 770,120 730,140 690,120" fill="url(#cubeTop3)" stroke="#b8d9a8" stroke-width="1"/>
  <polygon points="690,120 730,140 730,200 690,180" fill="url(#cubeLeft3)" stroke="#90c080" stroke-width="1"/>
  <polygon points="730,140 770,120 770,180 730,200" fill="url(#cubeRight3)" stroke="#b8d8a8" stroke-width="1"/>
  <text x="730" y="122" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" font-weight="700" fill="#3a6a4a">Turso</text>
  <text x="730" y="158" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#5a8a6a">memory</text>
  <text x="730" y="170" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7.5" fill="#5a8a6a">returned</text>
  <!-- db rows on left face -->
  <rect x="695" y="148" width="28" height="5" rx="2" fill="#b8d9a8" opacity="0.7"/>
  <rect x="695" y="156" width="22" height="5" rx="2" fill="#b8d9a8" opacity="0.5"/>
  <rect x="695" y="164" width="25" height="5" rx="2" fill="#b8d9a8" opacity="0.4"/>
  <rect x="695" y="172" width="20" height="5" rx="2" fill="#b8d9a8" opacity="0.3"/>

  <!-- Return arrow (bottom, full width) -->
  <path d="M 730,203 C 730,230 430,250 75,230 C 75,220 75,210 75,205" stroke="#b8d9a8" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <rect x="360" y="248" width="140" height="16" rx="6" fill="#eef5ee" stroke="#b8d9a8" stroke-width="1"/>
  <text x="430" y="260" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#3a6a4a">200 OK + memory data</text>

  <!-- Step numbers -->
  <circle cx="75" cy="218" r="9" fill="#e8d5f5" stroke="#c4b0e0" stroke-width="1"/>
  <text x="75" y="222" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#7c5cbf">1</text>
  <circle cx="230" cy="218" r="9" fill="#d4e8ff" stroke="#9bbfe8" stroke-width="1"/>
  <text x="230" y="222" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#3a6a9a">2</text>
  <circle cx="385" cy="218" r="9" fill="#fde8d0" stroke="#f5c8a0" stroke-width="1"/>
  <text x="385" y="222" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#a06030">3</text>
  <circle cx="560" cy="218" r="9" fill="#e8d5f5" stroke="#c4b0e0" stroke-width="1"/>
  <text x="560" y="222" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#7c5cbf">4</text>
  <circle cx="730" cy="218" r="9" fill="#d4eac8" stroke="#b8d9a8" stroke-width="1"/>
  <text x="730" y="222" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#3a6a4a">5</text>

  <!-- Step descriptions -->
  <text x="75" y="240" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#7c5cbf">GET /memory/fid</text>
  <text x="230" y="240" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#3a6a9a">HTTP 402</text>
  <text x="385" y="240" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#a06030">auto-pay USDC</text>
  <text x="560" y="240" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#7c5cbf">ownerOf check</text>
  <text x="730" y="240" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="8" fill="#3a6a4a">SQL query</text>

  <!-- Title label bottom -->
  <text x="430" y="310" text-anchor="middle" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#b0a0c8">Full round-trip: agent request to memory response, with x402 payment and ERC-8004 identity verification</text>
</svg>
